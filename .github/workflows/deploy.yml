name: Deploy
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
jobs:
  Build:
    uses: nareshgdevops/roboshop-github-actions/.github/workflows/ask-deploy.yml@main
    with:
      appName: 'user'
      appEnv: 'dev'
      resourceGroup: 'ukwest-dev'
    secrets:
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}

